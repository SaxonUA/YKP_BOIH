<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>WoT Mark Widget</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    .widget {
      width: 300px;
      padding: 12px 14px 13px;
      background: rgba(12, 12, 16, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
    }

    .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
    }

    .tank {
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 4px rgba(0,0,0,.7);
    }

    .markBox {
      display: flex;
      align-items: baseline;
      gap: 7px;
      white-space: nowrap;
    }

    .mark {
      font-size: 22px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      text-shadow: 0 2px 5px rgba(0,0,0,.75);
    }

    .delta {
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }

    .delta.plus {
      color: #50ff8a;
    }

    .delta.minus {
      color: #ff6464;
    }

    .barWrap {
      position: relative;
      width: 100%;
      height: 13px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.16);
    }

    .bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        #ff2020 0%,
        #ff2020 15%,
        #ff8a00 35%,
        #ffe600 55%,
        #42ff58 70%,
        #20eaff 85%,
        #b44cff 100%
      );
      transition: width .25s ease;
    }

    .marks {
      position: relative;
      width: 100%;
      height: 14px;
      margin-top: 3px;
      font-size: 9px;
      font-weight: 800;
      color: rgba(255,255,255,.7);
    }

    .m {
      position: absolute;
      transform: translateX(-50%);
      top: 0;
    }

    .m65 { left: 65%; }
    .m85 { left: 85%; }
    .m95 { left: 95%; }
    .m100 { left: 100%; transform: translateX(-100%); }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,.92);
      text-shadow: 0 2px 4px rgba(0,0,0,.65);
    }

    .need {
      color: rgba(255,255,255,.82);
    }

    .muted {
      color: rgba(255,255,255,.45);
    }
  </style>
</head>

<body>
  <div class="widget">
    <div class="top">
      <div class="tank" id="tankName">---</div>

      <div class="markBox">
        <div class="mark" id="markPercent">--.--%</div>
        <div class="delta" id="markDelta">---</div>
      </div>
    </div>

    <div class="barWrap">
      <div class="bar" id="bar"></div>
    </div>

    <div class="marks">
      <span class="m m65">65</span>
      <span class="m m85">85</span>
      <span class="m m95">95</span>
      <span class="m m100">100</span>
    </div>

    <div class="bottom">
      <div id="battleSum">0</div>
      <div class="need" id="needText">0 / ---</div>
    </div>
  </div>

  <script>
    const WS_URL =
      new URLSearchParams(location.search).get("ws") ||
      "ws://127.0.0.1:3413";

    const state = {
      vehicleName: "---",
      vehicleTag: null,

      dossierVehicleTag: null,
      startMark: null,
      currentMark: null,
      baseAvg: null,
      battlesCount: null,

      damage: 0,
      assist: 0,
      blocked: 0,
      stun: 0,

      inBattle: false,
      connected: false
    };

    const el = {
      tankName: document.getElementById("tankName"),
      markPercent: document.getElementById("markPercent"),
      markDelta: document.getElementById("markDelta"),
      bar: document.getElementById("bar"),
      battleSum: document.getElementById("battleSum"),
      needText: document.getElementById("needText")
    };

    function num(v, def = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : def;
    }

    function round(v, d = 2) {
      return Number(v).toFixed(d);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function formatInt(v) {
      return Math.round(num(v)).toLocaleString("ru-RU");
    }

    function setState(path, value) {
      switch (path) {
        case "hangar.vehicle.info":
          if (value) {
            state.vehicleName =
              value.localizedShortName ||
              value.localizedName ||
              "---";

            state.vehicleTag = value.tag || null;

            state.damage = 0;
            state.assist = 0;
            state.blocked = 0;
            state.stun = 0;

            state.startMark = null;
            state.currentMark = null;
          }
          break;

        case "battle.vehicle":
          if (value) {
            state.vehicleName =
              value.localizedShortName ||
              value.localizedName ||
              state.vehicleName;

            state.vehicleTag = value.tag || state.vehicleTag;
          }
          break;

        case "dossier.current":
          if (!value) break;

          // Головний захист: не брати відмітку від іншого танка
          if (state.vehicleTag && value.vehicleTag && value.vehicleTag !== state.vehicleTag) {
            break;
          }

          state.dossierVehicleTag = value.vehicleTag || null;
          state.currentMark = num(value.damageRating, state.currentMark);
          state.baseAvg = num(value.movingAvgDamage, state.baseAvg);
          state.battlesCount = num(value.battlesCount, state.battlesCount);

          if (state.startMark === null) {
            state.startMark = state.currentMark;
          }
          break;

        case "battle.isInBattle":
          state.inBattle = value === true;
          if (state.inBattle) {
            state.damage = 0;
            state.assist = 0;
            state.blocked = 0;
            state.stun = 0;

            if (state.currentMark !== null) {
              state.startMark = state.currentMark;
            }
          }
          break;

        case "battle.efficiency.damage":
          state.damage = num(value);
          break;

        case "battle.efficiency.assist":
          state.assist = num(value);
          break;

        case "battle.efficiency.blocked":
          state.blocked = num(value);
          break;

        case "battle.efficiency.stun":
          state.stun = num(value);
          break;
      }

      render();
    }

    function handleBattleResult(value) {
      if (!value || !value.personal) return;

      let personal = null;

      if (state.vehicleTag && value.personal) {
        for (const key in value.personal) {
          const item = value.personal[key];
          if (!item || typeof item !== "object") continue;

          if (
            item.damageRating !== undefined ||
            item.movingAvgDamage !== undefined ||
            item.damageDealt !== undefined
          ) {
            personal = item;
            break;
          }
        }
      }

      if (!personal) return;

      if (personal.damageDealt !== undefined) {
        state.damage = num(personal.damageDealt);
      }

      const radio = num(personal.damageAssistedRadio);
      const track = num(personal.damageAssistedTrack);
      const stun = num(personal.damageAssistedStun);
      state.assist = radio + track + stun;

      if (personal.damageBlockedByArmor !== undefined) {
        state.blocked = num(personal.damageBlockedByArmor);
      }

      if (personal.damageRating !== undefined) {
        state.currentMark = num(personal.damageRating);
      }

      if (personal.movingAvgDamage !== undefined) {
        state.baseAvg = num(personal.movingAvgDamage);
      }

      render();
    }

    function getBattleSum() {
      return num(state.damage) + num(state.assist) + num(state.blocked);
    }

    function getNeedDamage() {
      if (!state.baseAvg) return null;

      // Орієнтир: показує, скільки потрібно набрати сумарки хоча б до поточного AVG
      return Math.max(0, state.baseAvg - getBattleSum());
    }

    function getLiveMark() {
      if (state.startMark === null) return state.currentMark;

      if (!state.baseAvg || !state.battlesCount) {
        return state.currentMark;
      }

      const sum = getBattleSum();

      // Обережна live-оцінка, щоб під час бою не ламати реальний dossier.current
      const diff = sum - state.baseAvg;
      const factor = 1 / Math.max(80, Math.min(180, state.battlesCount / 3));
      const live = state.startMark + diff * factor;

      return clamp(live, 0, 100);
    }

    function render() {
      const battleSum = getBattleSum();
      const liveMark = getLiveMark();
      const shownMark = liveMark !== null ? liveMark : state.currentMark;

      el.tankName.textContent = state.vehicleName || "---";

      if (shownMark !== null && Number.isFinite(shownMark)) {
        el.markPercent.textContent = `${round(shownMark, 2)}%`;
        el.bar.style.width = `${clamp(shownMark, 0, 100)}%`;
      } else {
        el.markPercent.textContent = "--.--%";
        el.bar.style.width = "0%";
      }

      if (
        state.startMark !== null &&
        shownMark !== null &&
        Number.isFinite(shownMark)
      ) {
        const delta = shownMark - state.startMark;
        const sign = delta >= 0 ? "+" : "";
        el.markDelta.textContent = `${sign}${round(delta, 2)}%`;
        el.markDelta.className = `delta ${delta >= 0 ? "plus" : "minus"}`;
      } else {
        el.markDelta.textContent = "---";
        el.markDelta.className = "delta";
      }

      const need = getNeedDamage();

      el.battleSum.textContent = formatInt(battleSum);

      if (need === null) {
        el.needText.textContent = `${formatInt(battleSum)} / ---`;
      } else {
        el.needText.textContent = `${formatInt(battleSum)} / ${formatInt(state.baseAvg)}`;
      }
    }

    function handleMessage(raw) {
      let msg;

      try {
        msg = typeof raw === "string" ? JSON.parse(raw) : raw;
      } catch (e) {
        return;
      }

      if (!msg) return;

      if (msg.type === "init" && Array.isArray(msg.states)) {
        msg.states.forEach(s => {
          if (s && s.path) setState(s.path, s.value);
        });
        return;
      }

      if (msg.type === "state") {
        setState(msg.path, msg.value);
        return;
      }

      if (msg.type === "trigger") {
        if (msg.path === "battle.onBattleResult") {
          handleBattleResult(msg.value);
        }
      }
    }

    function connect() {
      let ws;

      try {
        ws = new WebSocket(WS_URL);
      } catch (e) {
        setTimeout(connect, 2000);
        return;
      }

      ws.onopen = () => {
        state.connected = true;
      };

      ws.onmessage = (event) => {
        handleMessage(event.data);
      };

      ws.onclose = () => {
        state.connected = false;
        setTimeout(connect, 1500);
      };

      ws.onerror = () => {
        try {
          ws.close();
        } catch (e) {}
      };
    }

    render();
    connect();
  </script>
</body>
</html>
