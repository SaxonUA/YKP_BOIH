<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:transparent;
  font-family:"Roboto Condensed";
}

.widget{
  width:260px;
  padding:14px;
  border-radius:8px;
  background:rgba(0,0,0,.35);
  color:#fff;
}

.percent{
  font-size:40px;
  text-align:center;
  color:#fff;
}

.delta{
  text-align:center;
  font-size:16px;
}

.plus{color:#60FF00;}
.minus{color:#ff4b4b;}

.bar-bg{
  margin-top:10px;
  height:8px;
  background:rgba(255,255,255,.1);
  position:relative;
}

.bar{
  height:100%;
  width:0%;
  background:#fff;
}

.marker{
  position:absolute;
  width:2px;
  top:-2px;
  bottom:-2px;
  background:#fff;
}

.m65{left:65%;}
.m85{left:85%;}
.m95{left:95%;}

.total{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}

.tank{
  margin-top:6px;
  font-size:13px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="widget">

  <div id="percent" class="percent">--.--%</div>
  <div id="delta" class="delta">AUTO</div>

  <div class="bar-bg">
    <div class="marker m65"></div>
    <div class="marker m85"></div>
    <div class="marker m95"></div>
    <div id="bar" class="bar"></div>
  </div>

  <div class="total">
    <div>Загалом</div>
    <div><span id="value">0</span> / <span id="target">auto</span></div>
  </div>

  <div id="tank" class="tank"></div>

</div>

<script>
const WS_URL = "ws://localhost:38200";

let ws;

let damage=0;
let assist=0;

let startRating=null;
let startAvg=null;

let vehicleTag=null;
let tankShortName=null;

function cleanTankName(){
  if (tankShortName) return tankShortName;

  if (vehicleTag){
    let n = vehicleTag;

    if (n.includes(":")) n = n.split(":")[1];

    n = n.replace(/^[A-Z]\d+_/,"");
    n = n.replace(/_/g," ");
    n = n.replace(/([A-Z])(\d+)/g,"$1 $2");

    return n;
  }
  return "";
}

function value(){
  return damage + assist;
}

function percentCalc(){
  if (startRating==null || startAvg==null) return null;

  let ratio = value()/startAvg;
  return (startRating - 0.78) + ratio*1.55;
}

function update(){
  let v = value();
  document.getElementById("value").innerText = v;

  let p = percentCalc();

  if (p!=null){
    document.getElementById("percent").innerText = p.toFixed(2)+"%";
    document.getElementById("bar").style.width = p+"%";

    let diff = p - startRating;

    let d = document.getElementById("delta");
    d.innerText = (diff>=0?"+":"")+diff.toFixed(2)+"%";
    d.className = "delta " + (diff>0?"plus":"minus");
  }

  document.getElementById("tank").innerText = cleanTankName();
}

function connect(){
  ws = new WebSocket(WS_URL);

  ws.onmessage = e=>{
    let p = JSON.parse(e.data);

    if (p.type==="state"){
      if (p.path==="battle.efficiency.damage"){
        damage = p.value;
      }

      if (p.path==="battle.efficiency.assist"){
        assist = p.value;
      }

      if (p.path==="battle.vehicle"){
        tankShortName = p.value?.localizedShortName;
        vehicleTag = p.value?.tag;
      }

      if (p.path==="dossier.current"){
        startRating = p.value.damageRating;
        startAvg = p.value.movingAvgDamage;
      }
    }

    update();
  };

  ws.onclose = ()=>setTimeout(connect,1000);
}

connect();
</script>

</body>
</html>
