<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MoE Professional Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css" />
    <style>
        :root { --brand: #ff8c00; --bg: rgba(0,0,0,0.7); }
        body { margin: 0; background: transparent; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        .widget-container {
            width: 450px; height: 180px;
            background: var(--bg);
            border-left: 6px solid var(--brand);
            border-radius: 8px;
            padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { display: flex; justify-content: space-between; width: 100%; color: var(--brand); font-size: 14px; margin-bottom: 10px; }
        
        /* FlipClock Style */
        .clock-container { transform: scale(0.9); margin: 10px 0; }
        
        .footer { width: 100%; display: flex; justify-content: space-between; border-top: 1px solid #444; padding-top: 10px; color: #fff; font-size: 16px; }
        .delta { font-weight: bold; }
        .plus { color: #5eff00; }
        .minus { color: #ff4040; }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="header">
        <span id="player-nick">Saxon_ua</span>
        <span id="tank-name">Чекаю на бій...</span>
    </div>

    <div class="clock-container">
        <div id="moe-clock"></div>
    </div>

    <div class="footer">
        <span>Сумарна: <span id="total-perf">0</span></span>
        <span id="moe-delta" class="delta">0.00%</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

<script>
    const API_KEY = '1d3c9ce39ebb57594f182ed1ad88c03f';
    const ACCOUNT_ID = '594841106'; 
    
    let state = {
        startMoe: 0,
        currentMoe: 0,
        avgDamage: 2500, // Значення за замовчуванням (буде замінено)
        k: 2 / 101       // Коефіцієнт EMA для 100 боїв (як у ProTanki)
    };

    const clock = $('#moe-clock').FlipClock(0, { clockFace: 'Counter', minimumDigits: 4 });

    async function initTank(tankId, name) {
        document.getElementById('tank-name').innerText = name;
        try {
            // 1. Беремо поточну відмітку з WG API
            const res = await fetch(`https://api.worldoftanks.eu/wot/tanks/stats/?application_id=${API_KEY}&account_id=${ACCOUNT_ID}&tank_id=${tankId}&fields=achievements`);
            const data = await res.json();
            state.startMoe = data.data[ACCOUNT_ID][0].achievements.damage_rating;
            state.currentMoe = state.startMoe;
            
            // 2. Встановлюємо очікувану шкоду (спрощено, за рівнем танка)
            // В ідеалі тут підключити базу XVM або ProTanki
            state.avgDamage = (tankId % 500) + 2000; // Тимчасова заглушка для розрахунку
            
            updateDisplay(0);
        } catch (e) { console.error("API Error"); }
    }

    function calculateMoe(totalPerf) {
        if (state.startMoe === 0) return 0;
        
        // Математика ProTanki:
        // Відмітка змінюється залежно від різниці між поточною сумаркою та середньою
        const delta = (totalPerf - state.avgDamage) * (state.k / 100);
        return state.startMoe + delta;
    }

    function updateDisplay(total) {
        const newMoe = calculateMoe(total);
        const diff = newMoe - state.startMoe;
        
        // Оновлюємо FlipClock (85.50 -> 8550)
        clock.setTime(Math.round(newMoe * 100));
        
        document.getElementById('total-perf').innerText = total;
        const deltaEl = document.getElementById('moe-delta');
        deltaEl.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
        deltaEl.className = "delta " + (diff >= 0 ? "plus" : "minus");
    }

    // Підключення до WotStat
    function connect() {
        const ws = new WebSocket("ws://localhost:38200");
        let dmg = 0, ast = 0;

        ws.onmessage = (e) => {
            const m = JSON.parse(e.data);
            if (m.type === "state") {
                if (m.path === "battle.efficiency.damage") dmg = m.value;
                if (m.path === "battle.efficiency.assist") ast = m.value;
                if (m.path === "battle.arena" && m.value.playerVehicle) {
                    initTank(m.value.playerVehicle.tankId, m.value.playerVehicle.name);
                }
                updateDisplay(dmg + ast);
            }
        };
        ws.onclose = () => setTimeout(connect, 2000);
    }

    connect();
</script>
</body>
</html>
