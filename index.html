<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@900&display=swap');

        body { background: transparent; margin: 0; overflow: hidden; }
        
        .widget-container {
            width: 300px;
            padding: 15px;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
            border-left: 5px solid #ffaa00;
            font-family: 'Roboto', sans-serif;
            color: white;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }

        .label { font-size: 12px; text-transform: uppercase; color: #ffaa00; letter-spacing: 1px; }
        
        .value-wrapper { display: flex; align-items: baseline; gap: 10px; }
        
        .moe-value { font-size: 38px; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(255,170,0,0.5); }
        
        .perf-value { font-size: 14px; color: #aaa; }

        /* Анімація при зміні цифр */
        .updated { animation: flash 0.5s ease-out; }
        @keyframes flash {
            0% { color: #5eff00; }
            100% { color: white; }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="label" id="player-name">Завантаження...</div>
        <div class="value-wrapper">
            <div class="moe-value" id="moe">00.00%</div>
        </div>
        <div class="perf-value">Бій: <span id="perf">0</span></div>
    </div>

    <script>
        const socket = new WebSocket("ws://localhost:38200");

        socket.onmessage = (event) => {
            const res = JSON.parse(event.data);
            
            if (res.type === "MY_WIDGET_UPDATE") {
                const moeEl = document.getElementById('moe');
                const perfEl = document.getElementById('perf');
                const nameEl = document.getElementById('player-name');

                // Оновлюємо дані
                if (moeEl.innerText !== res.player.current.toFixed(2) + "%") {
                    moeEl.classList.add('updated');
                    setTimeout(() => moeEl.classList.remove('updated'), 500);
                }

                moeEl.innerText = res.player.current.toFixed(2) + "%";
                perfEl.innerText = res.player.battle_performance;
                nameEl.innerText = res.player.nickname;
            }
        };

        socket.onclose = () => setTimeout(() => location.reload(), 3000);
    </script>
</body>
</html>
