<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap');
        body { margin: 0; background: transparent; font-family: 'Roboto', sans-serif; color: white; overflow: hidden; }
        .moe-container {
            display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 25px; border-left: 6px solid #ff9d00;
            width: 350px; border-radius: 0 8px 8px 0;
        }
        .tank-name { font-size: 18px; color: #ff9d00; text-transform: uppercase; margin-bottom: 2px; }
        .main-row { display: flex; align-items: baseline; gap: 15px; }
        .current-moe { font-size: 64px; line-height: 1; font-weight: 900; }
        .delta { font-size: 28px; font-weight: bold; }
        .plus { color: #5eff00; }
        .minus { color: #ff4040; }
        .battle-info { font-size: 20px; margin-top: 10px; color: #aaa; border-top: 1px solid #333; padding-top: 8px; }
        #status { font-size: 10px; color: #444; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>

<div class="moe-container">
    <div class="tank-name" id="tank">SEARCHING BATTLE...</div>
    <div class="main-row">
        <div class="current-moe" id="moe">0.00%</div>
        <div class="delta" id="delta">+0.00%</div>
    </div>
    <div class="battle-info">SUM: <span id="total" style="color:white">0</span></div>
    <div id="status">ST: Waiting for WotStat data...</div>
</div>

<script>
    const API_KEY = '1d3c9ce39ebb57594f182ed1ad88c03f';
    const ACCOUNT_ID = '594760646'; // твій ID
    
    let state = { startMoe: 0, tankId: null, k: 0.019802, expected: 3000 };

    function setStatus(msg) { document.getElementById('status').innerText = "ST: " + msg; }

    async function loadMoe(tankId) {
        setStatus(`GETTING MOE FOR ${tankId}...`);
        try {
            // Використовуємо проксі з випадковим числом, щоб не кешувало старі дані
            const url = `https://api.worldoftanks.eu/wot/tanks/stats/?application_id=${API_KEY}&account_id=${ACCOUNT_ID}&tank_id=${tankId}&fields=achievements`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${Date.now()}`;
            
            const response = await fetch(proxyUrl);
            const json = await response.json();
            const data = JSON.parse(json.contents);
            
            if (data.status === "ok" && data.data[ACCOUNT_ID]) {
                state.startMoe = data.data[ACCOUNT_ID][0].achievements.damage_rating;
                setStatus(`SUCCESS! MOE: ${state.startMoe}%`);
                updateUI(0);
            } else {
                setStatus("API ERROR: No data for this tank.");
            }
        } catch (e) { setStatus("NETWORK ERROR: Check API Key or Proxy."); }
    }

    function updateUI(total) {
        let diff = (total - state.expected) * (state.k / 100);
        if (total === 0) diff = 0;

        const currentMoe = (state.startMoe + diff).toFixed(2);
        document.getElementById('moe').innerText = currentMoe + "%";
        document.getElementById('total').innerText = total;
        
        const deltaEl = document.getElementById('delta');
        deltaEl.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
        deltaEl.className = "delta " + (diff >= 0 ? "plus" : "minus");
    }

    function connect() {
        const socket = new WebSocket("ws://localhost:38200");
        
        socket.onopen = () => setStatus("CONNECTED. READY.");
        
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // Пряме сканування всього об'єкта
            const val = data.value || {};
            
            // Шукаємо танк у будь-якому місці
            const tankId = val.tankId || val.arena?.playerVehicle?.tankId || val.playerVehicle?.tankId;
            const tankName = val.name || val.arena?.playerVehicle?.name || val.playerVehicle?.name;

            if (tankId && state.tankId !== tankId) {
                state.tankId = tankId;
                document.getElementById('tank').innerText = tankName || "TANK " + tankId;
                loadMoe(tankId);
            }

            // Шукаємо шкоду та асист
            let dmg = val.damage || val.battle?.efficiency?.damage || 0;
            let ast = val.assist || val.battle?.efficiency?.assist || 0;
            
            // Якщо WotStat шле через path
            if (data.path === "battle.efficiency.damage") dmg = data.value;
            if (data.path === "battle.efficiency.assist") ast = data.value;

            if (state.startMoe > 0 && (dmg > 0 || ast > 0)) {
                updateUI(dmg + ast);
            }
        };

        socket.onclose = () => setTimeout(connect, 2000);
    }

    connect();
</script>
</body>
</html>
