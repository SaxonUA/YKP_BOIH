<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>MOE Widget</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.widget {
  width: 390px;
  padding: 18px 22px 16px;
  border-radius: 10px;
  background: rgba(10, 15, 20, 0.72);
  box-shadow: 0 0 22px rgba(0,0,0,.45);
  color: #fff;
  text-shadow: 0 2px 4px #000;
}

.top {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 14px;
}

.mark {
  font-size: 46px;
  font-weight: 800;
}

.delta {
  font-size: 18px;
  font-weight: 700;
}

.delta.plus { color: #62ff45; }
.delta.minus { color: #ff4b3e; }
.delta.zero { color: #ddd; }

.bar-wrap {
  position: relative;
  height: 13px;
  margin-top: 10px;
  border: 1px solid rgba(255,255,255,.35);
  background: rgba(255,255,255,.10);
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(
    90deg,
    #ff0000 0%,
    #ff0000 15%,
    #ff8c00 35%,
    #ffff00 55%,
    #45ff35 70%,
    #00eaff 85%,
    #a000ff 100%
  );
  transition: width .25s ease;
}

.mark-line {
  position: absolute;
  top: -4px;
  width: 2px;
  height: 21px;
  background: rgba(255,255,255,.9);
}

.line65 { left: 65%; }
.line85 { left: 85%; }
.line95 { left: 95%; }

.labels {
  position: relative;
  height: 16px;
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.9);
}

.labels span {
  position: absolute;
  transform: translateX(-50%);
}

.labels .l65 { left: 65%; }
.labels .l85 { left: 85%; }
.labels .l95 { left: 95%; }

.row {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  font-size: 20px;
  font-weight: 800;
}

.total-value.good { color: #61ff45; }
.total-value.bad { color: #ff3b32; }

.tank {
  margin-top: 8px;
  font-size: 14px;
  color: rgba(255,255,255,.85);
}

.hidden {
  display: none;
}
</style>
</head>

<body>
<div class="widget">
  <div class="top">
    <div class="mark" id="mark">--.--%</div>
    <div class="delta zero" id="delta">+0.00%</div>
  </div>

  <div class="bar-wrap">
    <div class="bar" id="bar"></div>
    <div class="mark-line line65"></div>
    <div class="mark-line line85"></div>
    <div class="mark-line line95"></div>
  </div>

  <div class="labels">
    <span class="l65">65</span>
    <span class="l85">85</span>
    <span class="l95">95</span>
  </div>

  <div class="row">
    <div>Загалом</div>
    <div>
      <span id="battleTotal" class="total-value bad">0</span>
      <span>/</span>
      <span id="needTotal">---</span>
    </div>
  </div>

  <div class="tank" id="tankName">---</div>
</div>

<script>
const WS_URLS = [
  "ws://127.0.0.1:3413",
  "ws://localhost:3413"
];

const state = {
  vehicleName: null,
  vehicleTag: null,
  dossierVehicleTag: null,

  currentMark: null,
  startMark: null,
  baseAvg: null,
  battlesCount: null,

  damage: 0,
  assist: 0,
  blocked: 0,
  stun: 0,

  inBattle: false,
  battleStarted: false
};

const el = {
  mark: document.getElementById("mark"),
  delta: document.getElementById("delta"),
  bar: document.getElementById("bar"),
  battleTotal: document.getElementById("battleTotal"),
  needTotal: document.getElementById("needTotal"),
  tankName: document.getElementById("tankName")
};

function num(v, fallback = 0) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function formatInt(v) {
  return Math.round(num(v)).toLocaleString("de-DE");
}

function formatPercent(v) {
  if (!Number.isFinite(v)) return "--.--%";
  return v.toFixed(2) + "%";
}

function shortTankNameFromTag(tag) {
  if (!tag) return null;

  const raw = String(tag).split(":").pop() || tag;

  return raw
    .replace(/^[A-Z]\d+_/, "")
    .replace(/_/g, " ")
    .replace(/\bBat Chatillon Bourrasque DV\b/i, "Miel")
    .replace(/\bBat Chatillon Bourrasque\b/i, "Bourrasque")
    .replace(/\bFV4025 Contriver\b/i, "Contriver")
    .replace(/\bE65 Zwilling\b/i, "E 65 Zwilling")
    .trim();
}

function calcBattleTotal() {
  return num(state.damage) + num(state.assist);
}

function calcLiveAvg() {
  if (!Number.isFinite(state.baseAvg) || !Number.isFinite(state.battlesCount)) {
    return null;
  }

  const total = calcBattleTotal();
  return ((state.baseAvg * state.battlesCount) + total) / (state.battlesCount + 1);
}

function calcLiveMark() {
  if (!Number.isFinite(state.currentMark) || !Number.isFinite(state.baseAvg)) {
    return null;
  }

  const liveAvg = calcLiveAvg();
  if (!Number.isFinite(liveAvg)) return state.currentMark;

  const diffAvg = liveAvg - state.baseAvg;

  /*
    Приблизна live-оцінка відмітки.
    Реальні післябойові % дає сервер/досьє, але в бою ми рахуємо прогноз.
    Не чіпай коефіцієнт без потреби.
  */
  const percentPerAvgPoint = 0.0125;

  return clamp(state.currentMark + diffAvg * percentPerAvgPoint, 0, 100);
}

function calcNeededDamage() {
  if (!Number.isFinite(state.baseAvg)) return null;

  const mark = Number.isFinite(state.currentMark) ? state.currentMark : 0;

  let targetAvg;

  if (mark < 65) {
    targetAvg = state.baseAvg + 350;
  } else if (mark < 85) {
    targetAvg = state.baseAvg + 900;
  } else if (mark < 95) {
    targetAvg = state.baseAvg + 1400;
  } else {
    targetAvg = state.baseAvg + 1800;
  }

  const need = Math.max(0, Math.round(targetAvg));
  return need;
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function setDelta(value) {
  const d = el.delta;

  if (!Number.isFinite(value)) {
    d.textContent = "+0.00%";
    d.className = "delta zero";
    return;
  }

  const sign = value > 0 ? "+" : "";
  d.textContent = sign + value.toFixed(2) + "%";

  d.className = "delta " + (
    value > 0.005 ? "plus" :
    value < -0.005 ? "minus" :
    "zero"
  );
}

function render() {
  let visibleMark = calcLiveMark();

  if (!Number.isFinite(visibleMark)) {
    visibleMark = state.currentMark;
  }

  if (!Number.isFinite(visibleMark)) {
    el.mark.textContent = "--.--%";
    el.bar.style.width = "0%";
  } else {
    el.mark.textContent = formatPercent(visibleMark);
    el.bar.style.width = clamp(visibleMark, 0, 100) + "%";
  }

  const start = Number.isFinite(state.startMark) ? state.startMark : state.currentMark;
  const delta = Number.isFinite(visibleMark) && Number.isFinite(start)
    ? visibleMark - start
    : 0;

  setDelta(delta);

  const total = calcBattleTotal();
  const need = calcNeededDamage();

  el.battleTotal.textContent = formatInt(total);
  el.needTotal.textContent = Number.isFinite(need) ? formatInt(need) : "auto";

  el.battleTotal.className = "total-value " + (
    Number.isFinite(need) && total >= need ? "good" : "bad"
  );

  el.tankName.textContent =
    state.vehicleName ||
    shortTankNameFromTag(state.vehicleTag) ||
    shortTankNameFromTag(state.dossierVehicleTag) ||
    "---";
}

function resetBattleValues() {
  state.damage = 0;
  state.assist = 0;
  state.blocked = 0;
  state.stun = 0;
}

function handleState(path, value) {
  switch (path) {
    case "hangar.vehicle.info":
    case "battle.vehicle":
      if (value) {
        state.vehicleName = value.localizedShortName || value.localizedName || state.vehicleName;
        state.vehicleTag = value.tag || state.vehicleTag;
      }
      render();
      break;

    case "dossier.current":
      if (!value) break;

      state.dossierVehicleTag = value.vehicleTag || state.dossierVehicleTag;
      state.currentMark = num(value.damageRating, state.currentMark);
      state.baseAvg = num(value.movingAvgDamage, state.baseAvg);
      state.battlesCount = num(value.battlesCount, state.battlesCount);

      if (state.startMark === null && Number.isFinite(state.currentMark)) {
        state.startMark = state.currentMark;
      }

      if (!state.vehicleTag && value.vehicleTag) {
        state.vehicleTag = value.vehicleTag;
      }

      render();
      break;

    case "battle.isInBattle":
      state.inBattle = Boolean(value);

      if (state.inBattle && !state.battleStarted) {
        state.battleStarted = true;
        resetBattleValues();

        if (Number.isFinite(state.currentMark)) {
          state.startMark = state.currentMark;
        }
      }

      if (!state.inBattle) {
        state.battleStarted = false;
      }

      render();
      break;

    case "battle.efficiency.damage":
      state.damage = num(value);
      render();
      break;

    case "battle.efficiency.assist":
      state.assist = num(value);
      render();
      break;

    case "battle.efficiency.blocked":
      state.blocked = num(value);
      render();
      break;

    case "battle.efficiency.stun":
      state.stun = num(value);
      render();
      break;
  }
}

function handleMessage(msg) {
  if (!msg) return;

  if (msg.type === "init" && Array.isArray(msg.states)) {
    for (const item of msg.states) {
      handleState(item.path, item.value);
    }
    render();
    return;
  }

  if (msg.type === "state") {
    handleState(msg.path, msg.value);
    return;
  }

  if (msg.type === "trigger" && msg.path === "battle.onBattleResult") {
    const value = msg.value;
    const personal = value && value.personal;

    if (personal) {
      for (const key in personal) {
        const data = personal[key];

        if (data && typeof data === "object" && data.damageRating !== undefined) {
          state.currentMark = num(data.damageRating, state.currentMark);
        }

        if (data && typeof data === "object" && data.movingAvgDamage !== undefined) {
          state.baseAvg = num(data.movingAvgDamage, state.baseAvg);
        }
      }
    }

    resetBattleValues();
    state.startMark = state.currentMark;
    render();
  }
}

let wsIndex = 0;
let socket = null;

function connect() {
  const url = WS_URLS[wsIndex % WS_URLS.length];

  try {
    socket = new WebSocket(url);

    socket.onopen = () => {
      console.log("MOE widget connected:", url);
    };

    socket.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      } catch (e) {
        console.error("Bad WS message", e, event.data);
      }
    };

    socket.onclose = () => {
      console.log("MOE widget disconnected");
      wsIndex++;
      setTimeout(connect, 1500);
    };

    socket.onerror = () => {
      try { socket.close(); } catch (e) {}
    };

  } catch (e) {
    wsIndex++;
    setTimeout(connect, 1500);
  }
}

render();
connect();
</script>
</body>
</html>
