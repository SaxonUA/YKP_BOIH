<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>YKP BOIH Squad Marks</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  overflow: hidden;
}

body {
  padding: 0;
}

#wrap {
  width: 620px;
  height: 210px;
  background: transparent;
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 100%;
  border: 0;
  background: transparent;
}
</style>
</head>

<body>

<div id="wrap">
  <iframe id="wotstat"></iframe>
</div>

<script>
const CONFIG = {
  accent: "36ff50",
  background: "292929",
  anim: true,

  // Однаковий ключ у тебе і у совзводного.
  // Якщо не треба ключ — залиш пустим.
  channelKey: "",

  slots: [
    "player",
    "tank",
    "dmg",
    "assist",
    "gun-mark-dmg",
    "gun-mark-percent"
  ]
};

const params = new URLSearchParams();

params.set("accent", CONFIG.accent);
params.set("background", CONFIG.background);
params.set("anim", CONFIG.anim ? "true" : "false");
params.set("slots", CONFIG.slots.join(","));

if (CONFIG.channelKey.trim() !== "") {
  params.set("channelKey", CONFIG.channelKey.trim());
}

document.getElementById("wotstat").src =
  "https://widgets.wotstat.info/competitive/squad/efficiency?" + params.toString();
</script>

</body>
</html>
