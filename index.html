<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Віджет Відмітки - prIG0Rod Edition</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-color: rgba(0,0,0,0.0);
      --text-color:#ffffff;
      --hp-bg: rgba(0,0,0,0.35);
      --hp-border: rgba(255,255,255,0.18);
      --hp-fill: #36ff50; /* Зелений як у WotStat */
      --widget-width: 360px;
      --stroke: rgba(0,0,0,0.90);
      --stroke-w: 1px;
    }

    body{
      margin:0; padding:10px; height:100vh;
      background:var(--bg-color); color:var(--text-color);
      display:flex; justify-content:flex-start; align-items:flex-start;
      font-family: "Roboto Condensed", Arial, sans-serif;
    }

    .battle-widget{
      width: var(--widget-width);
      display:flex; flex-direction:column;
      align-items:flex-start; gap: 0.1rem;
      font-weight: 700;
    }

    /* Блок відмітки (Великі цифри) */
    .moe-section {
        margin-bottom: 5px;
    }
    .moe-value {
        font-size: 42px;
        line-height: 1;
        color: #ffffff;
        -webkit-text-stroke: 1.5px var(--stroke);
        filter: drop-shadow(0 0 5px rgba(54,255,80,0.5));
    }
    .moe-delta {
        font-size: 20px;
        margin-left: 10px;
    }
    .plus { color: #36ff50; }
    .minus { color: #ff4040; }

    .stat-block{
      display:flex; align-items:center;
      gap:.6rem; height: 30px;
    }

    .stat-label{
      width: 40px; flex: 0 0 40px;
      display:flex; justify-content:center; align-items:center;
    }

    .stat-label svg{
      width: 22px; height: 22px; fill: #ffffff;
      filter: drop-shadow(0 0 3px rgba(54,255,80,0.6));
    }

    .stat-value{
      font-size: 22px;
      -webkit-text-stroke: var(--stroke-w) var(--stroke);
      paint-order: stroke fill;
    }

    .tank-name {
        color: #ff9d00; /* Помаранчевий для назви танка */
        font-size: 18px;
        text-transform: uppercase;
        margin-bottom: 2px;
    }
  </style>
</head>

<body>
  <div class="battle-widget">
    
    <div id="tank-name" class="tank-name">Чекаю бій...</div>

    <div class="moe-section">
        <span id="moe-value" class="moe-value">0.00%</span>
        <span id="moe-delta" class="moe-delta"></span>
    </div>

    <div class="stat-block">
      <div class="stat-label">
        <svg viewBox="0 0 32 32"><path d="M9.361 11.32a.865.865 0 0 1 0-1.225l.734-.734a.866.866 0 0 1 1.224 0l3.672 3.672a.865.865 0 0 1 0 1.224l-.734.734a.865.865 0 0 1-1.224 0L9.361 11.32Zm7.648 7.647a.865.865 0 0 1 0-1.224l.734-.734a.866.866 0 0 1 1.224 0l3.672 3.672a.865.865 0 0 1 0 1.224l-.734.734a.865.865 0 0 1-1.224 0l-3.672-3.672Z"/></svg>
      </div>
      <div id="combined-value" class="stat-value">0</div>
      <div style="font-size: 12px; color: #888; margin-left: 10px;">ТРЕБА: <span id="target-value">0</span></div>
    </div>

    <div class="stat-block">
      <div class="stat-label">
        <svg viewBox="0 0 24 24"><path d="M12 2c-3.9 0-7 3.1-7 7 0 5.2 6 12.6 6.3 12.9.4.5 1.1.5 1.5 0C13 21.6 19 14.2 19 9c0-3.9-3.1-7-7-7zm0 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
      </div>
      <div id="map-name" class="stat-value">-</div>
    </div>

  </div>

<script>
  const WS_URL = "ws://localhost:38200";

  const tankEl = document.getElementById("tank-name");
  const moeEl = document.getElementById("moe-value");
  const deltaEl = document.getElementById("moe-delta");
  const combinedEl = document.getElementById("combined-value");
  const targetEl = document.getElementById("target-value");
  const mapEl = document.getElementById("map-name");

  let ws;
  let startMoe = null;

  function connectWS(){
    ws = new WebSocket(WS_URL);
    ws.onopen = () => console.log("Connected to WotStat");
    ws.onclose = () => setTimeout(connectWS, 1000);
    ws.onmessage = handleMessage;
  }

  function handleMessage(e){
    try {
      const p = JSON.parse(e.data);
      if (p.type !== "state") return;

      const val = p.value || {};
      const battle = val.battle || {};
      const arena = val.arena || {};

      // 1. Назва танка та мапа
      if (arena.playerVehicle) tankEl.textContent = arena.playerVehicle.name;
      if (arena.localizedName) mapEl.textContent = arena.localizedName;

      // 2. Дані відмітки (Gun Mark) з WotStat
      if (battle.efficiency && battle.efficiency.gunMark) {
          const gm = battle.efficiency.gunMark;
          
          // Поточний %
          const currentMoe = gm.currentMoe || 0;
          moeEl.textContent = currentMoe.toFixed(2) + "%";

          // Фіксуємо початкову відмітку для дельти
          if (startMoe === null && currentMoe > 0) startMoe = currentMoe;

          // Рахуємо дельту
          if (startMoe !== null) {
              const diff = currentMoe - startMoe;
              deltaEl.textContent = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
              deltaEl.className = "moe-delta " + (diff >= 0 ? "plus" : "minus");
          }

          // Сумарка та "Скільки треба"
          const dmg = battle.efficiency.damage || 0;
          const ast = battle.efficiency.assist || 0;
          combinedEl.textContent = (dmg + ast).toLocaleString();
          targetEl.textContent = Math.round(gm.targetDamage || 0).toLocaleString();
      }

      // 3. Обробка виходу в ангар
      if (p.path === "hangar.isInHangar" && p.value === true) {
          startMoe = null;
          tankEl.textContent = "Чекаю бій...";
          moeEl.textContent = "0.00%";
          deltaEl.textContent = "";
          combinedEl.textContent = "0";
          targetEl.textContent = "0";
      }

    } catch(err) { console.error(err); }
  }

  connectWS();
</script>
</body>
</html>
