<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap');
        body { margin: 0; background: transparent; font-family: 'Roboto', sans-serif; color: white; overflow: hidden; }
        .moe-container {
            display: flex; flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 25px; border-left: 6px solid #ff9d00;
            width: 320px; border-radius: 0 8px 8px 0;
        }
        .tank-name { font-size: 18px; color: #ff9d00; text-transform: uppercase; margin-bottom: 2px; height: 22px; }
        .main-row { display: flex; align-items: baseline; gap: 15px; }
        .current-moe { font-size: 64px; line-height: 1; font-weight: 900; }
        .delta { font-size: 28px; font-weight: bold; }
        .plus { color: #5eff00; }
        .minus { color: #ff4040; }
        .battle-info { font-size: 20px; margin-top: 10px; color: #aaa; border-top: 1px solid #444; padding-top: 8px; }
        #status { font-size: 10px; color: #555; margin-top: 5px; font-family: monospace; }
    </style>
</head>
<body>

<div class="moe-container">
    <div class="tank-name" id="tank">READY...</div>
    <div class="main-row">
        <div class="current-moe" id="moe">0.00%</div>
        <div class="delta" id="delta">+0.00%</div>
    </div>
    <div class="battle-info">DAMAGE: <span id="total" style="color:white">0</span></div>
    <div id="status">Status: Start...</div>
</div>

<script>
    const API_KEY = '1d3c9ce39ebb57594f182ed1ad88c03f';
    const ACCOUNT_ID = '594760646'; // prIG0Rod
    
    let state = {
        startMoe: 0,
        tankId: null,
        k: 0.019802,
        expected: 3200 
    };

    function setStatus(msg) { document.getElementById('status').innerText = "ST: " + msg; }

    async function loadMoe(tankId) {
        setStatus(`FETCH MOE FOR ${tankId}...`);
        try {
            // Використовуємо corsproxy.io — він надійніший
            const url = `https://api.worldoftanks.eu/wot/tanks/stats/?application_id=${API_KEY}&account_id=${ACCOUNT_ID}&tank_id=${tankId}&fields=achievements`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
            
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            if (data.status === "ok" && data.data[ACCOUNT_ID]) {
                state.startMoe = data.data[ACCOUNT_ID][0].achievements.damage_rating;
                setStatus(`LOADED: ${state.startMoe}%`);
                updateUI(0, 0);
            }
        } catch (e) { setStatus("API ERR: CORS BLOCKED"); }
    }

    function updateUI(dmg, ast) {
        const total = dmg + ast;
        let diff = (total - state.expected) * (state.k / 100);
        if (total === 0) diff = 0;

        const currentMoe = (state.startMoe + diff).toFixed(2);
        document.getElementById('moe').innerText = currentMoe + "%";
        document.getElementById('total').innerText = total;
        
        const deltaEl = document.getElementById('delta');
        deltaEl.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
        deltaEl.className = "delta " + (diff >= 0 ? "plus" : "minus");
    }

    function connect() {
        const socket = new WebSocket("ws://localhost:38200");
        let d = 0, a = 0;

        socket.onopen = () => setStatus("WS CONNECTED");
        
        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            // Агресивний пошук даних
            if (msg.type === "state") {
                const val = msg.value;
                
                // Перевіряємо танк
                const tId = val?.playerVehicle?.tankId || val?.arena?.playerVehicle?.tankId;
                const tName = val?.playerVehicle?.name || val?.arena?.playerVehicle?.name;
                
                if (tId && state.tankId !== tId) {
                    state.tankId = tId;
                    document.getElementById('tank').innerText = tName || "TANK " + tId;
                    loadMoe(tId);
                }

                // Перевіряємо шкоду (WotStat може слати через path або всередині value)
                if (msg.path === "battle.efficiency.damage") d = msg.value;
                if (msg.path === "battle.efficiency.assist") a = msg.value;
                
                // Якщо прийшов пакет зі всіма даними відразу
                if (val?.battle?.efficiency) {
                    d = val.battle.efficiency.damage || d;
                    a = val.battle.efficiency.assist || a;
                }

                if (state.startMoe > 0) updateUI(d, a);
            }
        };

        socket.onclose = () => setTimeout(connect, 2000);
    }

    connect();
</script>
</body>
</html>
