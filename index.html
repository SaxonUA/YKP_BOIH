<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; background: transparent; font-family: 'Roboto Condensed', sans-serif; overflow: hidden; }
        body { padding: 15px; }
        .widget { 
            width: 270px; padding: 15px; border-radius: 12px; 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); color: white;
        }
        .header { display: flex; justify-content: center; align-items: baseline; gap: 12px; }
        .percent { font-size: 44px; font-weight: 700; text-shadow: 0 2px 8px #000; }
        .delta { font-size: 22px; font-weight: 700; text-shadow: 0 2px 4px #000; }
        .plus { color: #60ff00; } .minus { color: #ff4b4b; } .neutral { color: #ccc; }
        .bar-bg { 
            margin: 15px 0; height: 10px; background: rgba(255,255,255,0.1); 
            border-radius: 5px; border: 1px solid rgba(0,0,0,0.4); overflow: hidden; 
        }
        .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff4b4b, #ffff00, #60ff00); transition: width 0.4s ease; }
        .stats { display: flex; justify-content: space-between; font-size: 22px; font-weight: 700; }
        .label { color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .tank { margin-top: 8px; font-size: 13px; color: #999; text-align: left; opacity: 0.8; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="widget" class="widget">
    <div class="header">
        <div id="percent" class="percent">--.--%</div>
        <div id="delta" class="delta neutral">0.00%</div>
    </div>
    <div class="bar-bg"><div id="bar" class="bar"></div></div>
    <div class="stats">
        <span class="label">Загалом</span>
        <div><span id="current" class="minus">0</span> / <span id="target">0</span></div>
    </div>
    <div id="tank" class="tank">Синхронізація...</div>
</div>

<script>
const WS_URL = "ws://localhost:38200";
const EMA_K = 0.0198; // Коефіцієнт 2/101 для 100 боїв

let state = {
    damage: 0, spot: 0, track: 0, stun: 0,
    startRating: null, target: 0, tankName: ""
};

// Функція "розумного пошуку" у пакетах даних ProTanki
function smartSearch(obj, key) {
    if (obj && typeof obj === 'object') {
        if (key in obj) return obj[key];
        for (let k in obj) {
            let res = smartSearch(obj[k], key);
            if (res !== undefined) return res;
        }
    }
}

function updateUI() {
    const total = state.damage + Math.max(state.spot, state.track, state.stun);
    const target = state.target || 0;
    
    // Відображення чисел
    document.getElementById('current').textContent = total.toLocaleString();
    document.getElementById('target').textContent = Math.round(target).toLocaleString();
    document.getElementById('tank').textContent = state.tankName || "Танк не визначено";

    if (target > 0 && state.startRating !== null) {
        // РАХУЄМО ЯК В ОРИГІНАЛІ:
        // Зміна відмітки залежить від різниці між поточною сумаркою та планкою
        const diff = (total - target) * EMA_K;
        
        // Ціна 1% відмітки (приблизно 4.2% від планки для середніх рівнів)
        const weight = target * 0.042; 
        const deltaPct = diff / (weight / 100); 
        const currentPct = Math.max(0, Math.min(100, state.startRating + deltaPct));

        document.getElementById('percent').textContent = currentPct.toFixed(2) + "%";
        document.getElementById('bar').style.width = currentPct + "%";
        
        const dEl = document.getElementById('delta');
        dEl.textContent = (deltaPct >= 0 ? "+" : "") + deltaPct.toFixed(2) + "%";
        dEl.className = "delta " + (deltaPct > 0.005 ? "plus" : (deltaPct < -0.005 ? "minus" : "neutral"));
        
        document.getElementById('current').className = total >= target ? "plus" : "minus";
    }
}

function connect() {
    const ws = new WebSocket(WS_URL);
    
    ws.onmessage = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === "state") {
            const p = msg.path.toLowerCase();
            const v = msg.value;

            // Оновлення бойових значень
            if (p.includes("efficiency.damage")) state.damage = Number(v) || 0;
            if (p.includes("assistedradio")) state.spot = Number(v) || 0;
            if (p.includes("assistedtrack")) state.track = Number(v) || 0;
            if (p.includes("assistedstun")) state.stun = Number(v) || 0;

            // Витягуємо ПЛАНКУ (movingAvgDamage)
            const foundTarget = smartSearch(v, "movingAvgDamage");
            if (foundTarget) state.target = foundTarget;

            // Витягуємо початковий ВІДСОТОК (тільки на старті бою)
            const foundRating = smartSearch(v, "damageRating");
            if (foundRating && state.damage === 0) state.startRating = foundRating;

            // Витягуємо назву ТАНКА
            const foundName = smartSearch(v, "localizedShortName");
            if (foundName) state.tankName = foundName;

            // Керування видимістю
            if (p.includes("battle.isinbattle")) {
                document.getElementById('widget').classList.toggle("hidden", !v);
                if (!v) { state.damage = 0; state.spot = 0; state.track = 0; state.stun = 0; }
            }

            updateUI();
        }
    };

    ws.onclose = () => setTimeout(connect, 1000);
}

connect();
</script>
</body>
</html>
