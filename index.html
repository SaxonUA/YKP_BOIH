<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>WotStat MOE Compact Widget</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --very_bad:#FF6347;
  --bad:#FE7903;
  --normal:#F8F400;
  --good:#60FF00;
  --very_good:#02C9B3;
  --unique:#D042F3;
  --white:#ffffff;
  --muted:#cfd6df;
}

html,body{
  margin:0;
  padding:0;
  background:transparent;
  font-family:"Roboto Condensed",Arial,sans-serif;
  overflow:hidden;
}

body{
  padding:12px;
}

.widget{
  width:255px;
  color:white;
  background:rgba(10,18,28,.28);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 0 22px rgba(0,0,0,.45);
  backdrop-filter:blur(3px);
  border-radius:7px;
  padding:14px 18px 13px;
}

.top{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:10px;
}

.percent{
  font-size:42px;
  line-height:1;
  font-weight:700;
  color:#ffffff !important;
  text-shadow:0 2px 5px #000;
  -webkit-text-stroke:1px rgba(0,0,0,.88);
}

.delta{
  font-size:18px;
  line-height:1;
  margin-top:9px;
  font-weight:400;
  color:#dfe6ef;
  text-shadow:0 2px 4px #000;
}

.plus{color:var(--good) !important;}
.minus{color:var(--very_bad) !important;}
.neutral{color:#dfe6ef !important;}

.bar-bg{
  margin-top:10px;
  width:100%;
  height:7px;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.14);
  overflow:hidden;
  position:relative;
}

.bar{
  height:100%;
  width:0%;
  background:var(--good);
  box-shadow:0 0 12px currentColor;
  transition:width .18s linear, background .18s linear;
}

.compact-total{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
  text-shadow:0 2px 4px #000;
}

.compact-total .label{
  color:#cfd6df;
  font-weight:400;
}

.compact-total .value{
  font-weight:700;
}

.small{
  margin-top:7px;
  font-size:12px;
  color:#b7c2ce;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-shadow:0 2px 3px #000;
}

.status-ok{color:var(--good);}
.status-wait{color:var(--normal);}
.status-bad{color:var(--very_bad);}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div id="widget" class="widget">

  <div class="top">
    <div id="mark-percent" class="percent">--.--%</div>
    <div id="mark-delta" class="delta neutral">AUTO</div>
  </div>

  <div class="bar-bg">
    <div id="mark-bar" class="bar"></div>
  </div>

  <div class="compact-total">
    <div class="label">Загалом</div>
    <div class="value">
      <span id="battle-value">0</span> / <span id="target-value">auto</span>
    </div>
  </div>

  <div id="tank-name" class="small">Очікування танка...</div>
  <div id="status-line" class="small status-wait">WebSocket: підключення...</div>

</div>

<script>
const WS_URL = "ws://localhost:38200";

const EMA_K = 2 / 101;

const LIVE_START_DROP = 0.78;
const LIVE_GAIN_AT_TARGET = 1.12;

const LOCAL_TARGETS = {
  // Приклад:
  // "germany:G177_E65_Zwilling": { "65": 1900, "85": 3000, "95": 4200 }
};

const el = id => document.getElementById(id);

const fmt = n => Number(n || 0).toLocaleString("uk-UA");

const clamp = (v,min,max) => Math.max(min, Math.min(max, v));

const num = v => {
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
};

const widgetEl = el("widget");
const percentEl = el("mark-percent");
const deltaEl = el("mark-delta");
const barEl = el("mark-bar");

const battleValueEl = el("battle-value");
const targetEl = el("target-value");
const tankEl = el("tank-name");
const statusEl = el("status-line");

let ws;
let reconnectTimer;

let playerId = null;

let battleDamage = 0;

let liveAssist = 0;
let spotAssist = 0;
let trackAssist = 0;
let stunAssist = 0;

let curHP = 0;
let maxHP = 0;

let vehicleTag = null;
let tankName = null;

let startRating = null;
let startMovingAvg = null;
let marksOnGun = null;
let battlesCount = null;

let moeDistribution = null;
let autoTarget = null;

let lastBattleResultApplied = false;

function setStatus(text, cls){
  statusEl.textContent = text;
  statusEl.className = "small " + (cls || "status-wait");
}

function getMarkColor(mark){
  if (mark === null || mark === undefined) return "#FFFFFF";
  if (mark < 65) return "#FF6347";
  if (mark < 75) return "#FE7903";
  if (mark < 85) return "#F8F400";
  if (mark < 95) return "#60FF00";
  if (mark < 100) return "#02C9B3";
  return "#D042F3";
}

function bestAssist(){
  return Math.max(
    Number(liveAssist) || 0,
    Number(spotAssist) || 0,
    Number(trackAssist) || 0,
    Number(stunAssist) || 0
  );
}

function battleValue(){
  return (Number(battleDamage) || 0) + bestAssist();
}

function predictedMovingAvg(){
  if (startMovingAvg === null) return null;
  return startMovingAvg + EMA_K * (battleValue() - startMovingAvg);
}

function storageKey(){
  const key = vehicleTag || tankName || "unknown";
  return "wotstat_moe_widget_" + key;
}

function saveVehicleData(){
  if (!vehicleTag && !tankName) return;

  const data = {
    vehicleTag,
    tankName,
    startRating,
    startMovingAvg,
    marksOnGun,
    battlesCount,
    moeDistribution,
    savedAt: Date.now()
  };

  localStorage.setItem(storageKey(), JSON.stringify(data));
}

function loadVehicleData(){
  if (!vehicleTag && !tankName) return false;

  const raw = localStorage.getItem(storageKey());
  if (!raw) return false;

  try{
    const data = JSON.parse(raw);

    if (data.startRating !== null && data.startRating !== undefined){
      startRating = Number(data.startRating);
    }

    if (data.startMovingAvg !== null && data.startMovingAvg !== undefined){
      startMovingAvg = Number(data.startMovingAvg);
    }

    if (data.marksOnGun !== null && data.marksOnGun !== undefined){
      marksOnGun = Number(data.marksOnGun);
    }

    if (data.battlesCount !== null && data.battlesCount !== undefined){
      battlesCount = Number(data.battlesCount);
    }

    if (Array.isArray(data.moeDistribution)){
      moeDistribution = data.moeDistribution;
    }

    setStatus("MOE: завантажено з памʼяті танка", "status-ok");
    updateWidget();
    return true;
  }catch(e){
    return false;
  }
}

function deepFind(obj, keys, path = ""){
  const found = [];

  if (!obj || typeof obj !== "object") return found;

  for (const k of Object.keys(obj)){
    const full = path ? path + "." + k : k;

    if (keys.includes(k)){
      found.push({
        path: full,
        key: k,
        value: obj[k]
      });
    }

    if (obj[k] && typeof obj[k] === "object"){
      found.push(...deepFind(obj[k], keys, full));
    }
  }

  return found;
}

function normalizeMoeDistribution(raw){
  if (!raw) return null;

  const points = [];

  if (Array.isArray(raw)){
    for (const item of raw){
      if (Array.isArray(item) && item.length >= 2){
        const p = num(item[0]);
        const d = num(item[1]);

        if (p !== null && d !== null){
          points.push({percent:p, damage:d});
        }
      } else if (item && typeof item === "object"){
        const p =
          num(item.percent) ??
          num(item.rating) ??
          num(item.mark) ??
          num(item.key) ??
          num(item[0]);

        const d =
          num(item.damage) ??
          num(item.value) ??
          num(item.avgDamage) ??
          num(item.movingAvgDamage) ??
          num(item[1]);

        if (p !== null && d !== null){
          points.push({percent:p, damage:d});
        }
      }
    }
  } else if (typeof raw === "object"){
    for (const k of Object.keys(raw)){
      const p = num(k);
      const d = num(raw[k]);

      if (p !== null && d !== null){
        points.push({percent:p, damage:d});
      }
    }
  }

  points.sort((a,b) => a.percent - b.percent);

  return points.length ? points : null;
}

function applyLocalTargets(){
  if (!vehicleTag) return;
  if (moeDistribution) return;

  const local = LOCAL_TARGETS[vehicleTag];
  if (!local) return;

  moeDistribution = normalizeMoeDistribution(local);
}

function interpolateRatingFromAvg(avg){
  if (avg === null || !moeDistribution || moeDistribution.length < 2){
    return null;
  }

  const points = moeDistribution;

  if (avg <= points[0].damage){
    return points[0].percent;
  }

  for (let i = 0; i < points.length - 1; i++){
    const a = points[i];
    const b = points[i + 1];

    if (avg >= a.damage && avg <= b.damage){
      const t = (avg - a.damage) / Math.max(1, b.damage - a.damage);
      return a.percent + t * (b.percent - a.percent);
    }
  }

  return points[points.length - 1].percent;
}

function getNextTarget(){
  applyLocalTargets();

  if (!moeDistribution || !moeDistribution.length){
    return null;
  }

  const current =
    startRating ??
    interpolateRatingFromAvg(startMovingAvg) ??
    0;

  for (const p of moeDistribution){
    if (p.percent > current){
      return Math.round(p.damage);
    }
  }

  return Math.round(moeDistribution[moeDistribution.length - 1].damage);
}

function liveHeuristicRating(){
  if (startRating === null) return null;

  const avgNew = predictedMovingAvg();
  const exact = interpolateRatingFromAvg(avgNew);

  if (exact !== null){
    return exact;
  }

  const target = autoTarget || startMovingAvg || 1;
  const ratio = clamp(battleValue() / Math.max(1, target), 0, 1.25);

  return startRating - LIVE_START_DROP + ratio * LIVE_GAIN_AT_TARGET;
}

function updateWidget(){
  const value = battleValue();

  autoTarget = getNextTarget();

  battleValueEl.textContent = fmt(value);
  targetEl.textContent = autoTarget !== null ? fmt(autoTarget) : "auto";

  battleValueEl.className =
    autoTarget !== null && value >= autoTarget ? "plus" : "minus";

  let shownRating = liveHeuristicRating();

  if (shownRating !== null){
    const color = getMarkColor(shownRating);

    percentEl.textContent = Number(shownRating).toFixed(2) + "%";
    percentEl.style.color = "#ffffff";

    barEl.style.width = clamp(shownRating, 0, 100) + "%";
    barEl.style.background = color;
    barEl.style.color = color;
  } else {
    percentEl.textContent = "--.--%";
    percentEl.style.color = "#ffffff";

    barEl.style.width = "0%";
    barEl.style.background = "#ffffff";
  }

  if (startRating !== null && shownRating !== null){
    const diff = shownRating - startRating;

    deltaEl.textContent = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
    deltaEl.className = "delta " + (diff > 0 ? "plus" : diff < 0 ? "minus" : "neutral");
  } else {
    deltaEl.textContent = "AUTO";
    deltaEl.className = "delta neutral";
  }

  if (tankName || vehicleTag){
    tankEl.textContent = tankName
      ? `${tankName}${vehicleTag ? " • " + vehicleTag : ""}`
      : vehicleTag;
  }
}

function resetBattleOnly(){
  battleDamage = 0;

  liveAssist = 0;
  spotAssist = 0;
  trackAssist = 0;
  stunAssist = 0;

  curHP = 0;
  maxHP = 0;

  lastBattleResultApplied = false;

  updateWidget();
}

function applyDossier(value){
  if (!value || typeof value !== "object") return;

  const found = deepFind(value, [
    "damageRating",
    "movingAvgDamage",
    "battlesCount",
    "battleCount",
    "marksOnGun",
    "vehicleTag"
  ]);

  for (const f of found){
    if (f.key === "vehicleTag" && f.value){
      vehicleTag = String(f.value);
    }

    if (f.key === "damageRating"){
      const v = num(f.value);
      if (v !== null) startRating = v;
    }

    if (f.key === "movingAvgDamage"){
      const v = num(f.value);
      if (v !== null) startMovingAvg = v;
    }

    if (f.key === "battlesCount" || f.key === "battleCount"){
      const v = num(f.value);
      if (v !== null) battlesCount = v;
    }

    if (f.key === "marksOnGun"){
      const v = num(f.value);
      if (v !== null) marksOnGun = v;
    }
  }

  saveVehicleData();
  setStatus("Dossier: дані відмітки отримано", "status-ok");
  updateWidget();
}

function applyMoeInfo(value){
  if (!value || typeof value !== "object") return;

  const found = deepFind(value, [
    "damageBetterThanNPercent",
    "vehicleTag",
    "damageRating",
    "movingAvgDamage",
    "battleCount",
    "battlesCount"
  ]);

  for (const f of found){
    if (f.key === "vehicleTag" && f.value){
      vehicleTag = String(f.value);
    }

    if (f.key === "damageBetterThanNPercent"){
      const dist = normalizeMoeDistribution(f.value);
      if (dist) moeDistribution = dist;
    }

    if (f.key === "damageRating"){
      const v = num(f.value);
      if (v !== null) startRating = v;
    }

    if (f.key === "movingAvgDamage"){
      const v = num(f.value);
      if (v !== null) startMovingAvg = v;
    }

    if (f.key === "battleCount" || f.key === "battlesCount"){
      const v = num(f.value);
      if (v !== null) battlesCount = v;
    }
  }

  saveVehicleData();

  setStatus(
    moeDistribution ? "MOE: таблиця цілей отримана" : "MOE: дані отримано без таблиці",
    "status-ok"
  );

  updateWidget();
}

function extractPlayerIdFromBattleResult(result){
  const personal = result?.personal || {};

  for (const key of Object.keys(personal)){
    if (key === "avatar") continue;

    const r = personal[key];

    if (!r || typeof r !== "object") continue;

    if (typeof r.accountDBID !== "undefined"){
      return Number(r.accountDBID);
    }
  }

  return null;
}

function applyBattleResult(result){
  if (lastBattleResultApplied) return;

  const detectedId = extractPlayerIdFromBattleResult(result);

  if (detectedId && !playerId){
    playerId = detectedId;
  }

  const personal = result?.personal || {};

  for (const key of Object.keys(personal)){
    if (key === "avatar") continue;

    const r = personal[key];

    if (!r || typeof r !== "object") continue;

    if (playerId && Number(r.accountDBID) !== Number(playerId)) continue;

    battleDamage = Number(r.damageDealt) || 0;

    spotAssist = Number(r.damageAssistedRadio) || 0;
    trackAssist = Number(r.damageAssistedTrack) || 0;
    stunAssist = Number(r.damageAssistedStun) || 0;

    liveAssist = Math.max(spotAssist, trackAssist, stunAssist);

    if (typeof r.damageRating !== "undefined"){
      startRating = Number(r.damageRating);
    }

    if (typeof r.movingAvgDamage !== "undefined"){
      startMovingAvg = Number(r.movingAvgDamage);
    }

    if (typeof r.marksOnGun !== "undefined"){
      marksOnGun = Number(r.marksOnGun);
    }

    if (typeof r.battleNum !== "undefined"){
      battlesCount = Number(r.battleNum);
    }

    if (typeof r.typeCompDescr !== "undefined" && !vehicleTag){
      vehicleTag = "typeCompDescr:" + r.typeCompDescr;
    }

    lastBattleResultApplied = true;

    saveVehicleData();
    setStatus("Після бою: реальна відмітка збережена", "status-ok");
    updateWidget();

    return;
  }
}

function connectWS(){
  setStatus("WebSocket: підключення...", "status-wait");

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    clearTimeout(reconnectTimer);
    setStatus("WebSocket: підключено", "status-ok");
  };

  ws.onclose = () => {
    setStatus("WebSocket: перепідключення...", "status-bad");
    reconnectTimer = setTimeout(connectWS, 1000);
  };

  ws.onerror = () => {
    try{
      ws.close();
    }catch(e){}
  };

  ws.onmessage = handleMessage;
}

function handleMessage(e){
  let p;

  try{
    p = JSON.parse(e.data);
  }catch(err){
    return;
  }

  if (!p || !p.type) return;

  if (p.type === "state"){
    switch(p.path){

      case "hangar.isInHangar":
        widgetEl.classList.toggle("hidden", !!p.value);
        if (p.value) resetBattleOnly();
        break;

      case "battle.isInBattle":
        widgetEl.classList.toggle("hidden", p.value === false);
        if (p.value === true){
          setStatus("Бій: live", "status-ok");
        }
        break;

      case "battle.vehicle":
        if (p.value?.localizedName){
          tankName = p.value.localizedName;
        } else if (p.value?.localizedShortName){
          tankName = p.value.localizedShortName;
        }

        if (p.value?.tag){
          vehicleTag = p.value.tag;
        }

        applyLocalTargets();
        loadVehicleData();
        updateWidget();
        break;

      case "battle.health":
        curHP = Math.max(0, Number(p.value) || 0);
        updateWidget();
        break;

      case "battle.maxHealth":
        maxHP = Number(p.value) || 0;
        updateWidget();
        break;

      case "battle.efficiency.damage":
        battleDamage = Number(p.value) || 0;
        updateWidget();
        break;

      case "battle.efficiency.assist":
        liveAssist = Number(p.value) || 0;
        updateWidget();
        break;

      case "battle.efficiency.damageAssistedRadio":
        spotAssist = Number(p.value) || 0;
        updateWidget();
        break;

      case "battle.efficiency.damageAssistedTrack":
        trackAssist = Number(p.value) || 0;
        updateWidget();
        break;

      case "battle.efficiency.damageAssistedStun":
        stunAssist = Number(p.value) || 0;
        updateWidget();
        break;

      case "dossier.current":
        applyDossier(p.value);
        break;

      case "moeInfo.current":
        applyMoeInfo(p.value);
        break;

      default:
        if (String(p.path).toLowerCase().includes("dossier")){
          applyDossier(p.value);
        }

        if (String(p.path).toLowerCase().includes("moe")){
          applyMoeInfo(p.value);
        }

        if (String(p.path).toLowerCase().includes("assist")){
          const v = Number(p.value) || 0;

          if (String(p.path).toLowerCase().includes("radio")){
            spotAssist = v;
          } else if (String(p.path).toLowerCase().includes("track")){
            trackAssist = v;
          } else if (String(p.path).toLowerCase().includes("stun")){
            stunAssist = v;
          } else {
            liveAssist = v;
          }

          updateWidget();
        }

        break;
    }
  }

  if (p.type === "trigger" && p.path === "battle.onBattleResult"){
    applyBattleResult(p.value);
  }
}

updateWidget();
connectWS();
</script>

</body>
</html>
