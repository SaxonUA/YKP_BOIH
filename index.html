<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap');
        
        body { background: transparent; margin: 0; font-family: 'Roboto Condensed', sans-serif; color: white; }
        
        .widget {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 350px;
            padding: 10px;
        }

        .player-card {
            background: rgba(0, 0, 0, 0.7);
            border-left: 4px solid #ff9d00;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .name { font-size: 14px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .moe-row { display: flex; align-items: baseline; gap: 8px; }
        .moe-value { font-size: 32px; font-weight: bold; }
        .delta { font-size: 16px; }
        .plus { color: #5eff00; }
        .minus { color: #ff4040; }
        .battle-info { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="widget">
    <div class="player-card" id="p1-card">
        <div class="name" id="p1-name">Мій танк</div>
        <div class="moe-row">
            <span class="moe-value" id="p1-moe">0.00%</span>
            <span class="delta" id="p1-delta"></span>
        </div>
        <div class="battle-info">Шкода: <span id="p1-dmg">0</span></div>
    </div>
</div>

<script>
    // НАЛАШТУВАННЯ
    const WS_URL = "ws://localhost:38200";
    
    // Змінні стану
    let currentDmg = 0;
    let currentAssist = 0;
    let startMoe = 0; // Це ми спробуємо витягнути з повідомлень мода
    
    const socket = new WebSocket(WS_URL);

    socket.onmessage = function(event) {
        const data = JSON.parse(event.data);

        // 1. Отримуємо дані про ефективність у бою
        if (data.type === "state") {
            if (data.path === "battle.efficiency.damage") {
                currentDmg = data.value;
                updateDisplay();
            }
            if (data.path === "battle.efficiency.assist") {
                currentAssist = data.value;
                updateDisplay();
            }
            // Спробуємо "зловити" назву танка або нік
            if (data.path === "battle.arena") {
                document.getElementById('p1-name').innerText = data.value.playerVehicle?.name || "В бою";
            }
        }
        
        // 2. Отримуємо дані про MoE з досьє, якщо мод їх транслює
        // Деякі версії WotStat транслюють шлях "hangar.moe" або подібні
        if (data.path && data.path.includes("moe")) {
            startMoe = data.value;
            updateDisplay();
        }
    };

    function updateDisplay() {
        const total = currentDmg + currentAssist;
        document.getElementById('p1-dmg').innerText = total;

        // Оскільки ми не маємо формули EMA конкретного танка без Python,
        // ми робимо приблизний розрахунок (0.01% за кожні 500 шкоди відносно середньої)
        // Це буде працювати як "індикатор прогресу" в реальному часі
        let estimatedChange = total / 40000; // Груба формула для візуалізації
        
        const displayMoe = (startMoe > 0) ? startMoe + estimatedChange : estimatedChange;
        
        const moeEl = document.getElementById('p1-moe');
        moeEl.innerText = displayMoe.toFixed(2) + "%";
        
        const deltaEl = document.getElementById('p1-delta');
        if (total > 0) {
            deltaEl.innerText = "+" + estimatedChange.toFixed(2);
            deltaEl.className = "delta plus";
        }
    }

    socket.onclose = () => setTimeout(() => location.reload(), 5000);
</script>
</body>
</html>
