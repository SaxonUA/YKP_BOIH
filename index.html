<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  background:transparent;
  font-family:"Roboto Condensed",Arial,sans-serif;
  overflow:hidden;
}
body{padding:12px;}

.widget{
  width:260px;
  padding:14px;
  border-radius:8px;
  background:rgba(0,0,0,.45);
  color:#fff;
  box-shadow:0 0 18px rgba(0,0,0,.45);
}

.top{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.percent{
  font-size:40px;
  line-height:1;
  font-weight:700;
  color:#fff;
  text-shadow:0 2px 5px #000;
  -webkit-text-stroke:1px rgba(0,0,0,.85);
}

.delta{
  font-size:18px;
  line-height:1;
  margin-top:5px;
  font-weight:700;
  text-shadow:0 2px 4px #000;
}

.plus{color:#60ff00;}
.minus{color:#ff4b4b;}
.neutral{color:#dfe6ef;}

.bar-bg{
  margin-top:14px;
  height:8px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.22);
  position:relative;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(
    90deg,
    #ff0000 0%,
    #ff7a00 18%,
    #ffff00 40%,
    #60ff00 60%,
    #00d8ff 80%,
    #a000ff 100%
  );
  background-size:260px 100%;
  background-repeat:no-repeat;
  transition:width .2s linear;
}

.marker{
  position:absolute;
  top:-2px;
  bottom:-2px;
  width:2px;
  background:rgba(255,255,255,.9);
  z-index:3;
}

.m65{left:65%;}
.m85{left:85%;}
.m95{left:95%;}

.total{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
  font-weight:700;
  text-shadow:0 2px 4px #000;
}

.total-label{color:#d7dde5;}
.value.good{color:#60ff00;}
.value.bad{color:#ff4b4b;}

.tank{
  margin-top:7px;
  font-size:13px;
  color:#cfd6df;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-shadow:0 2px 3px #000;
}

.hidden{display:none;}
</style>
</head>

<body>

<div id="widget" class="widget">
  <div class="top">
    <div id="percent" class="percent">--.--%</div>
    <div id="delta" class="delta neutral">0.00%</div>
  </div>

  <div class="bar-bg">
    <div class="marker m65"></div>
    <div class="marker m85"></div>
    <div class="marker m95"></div>
    <div id="bar" class="bar"></div>
  </div>

  <div class="total">
    <div class="total-label">Загалом</div>
    <div>
      <span id="value" class="value bad">0</span> / <span id="target">0</span>
    </div>
  </div>

  <div id="tank" class="tank"></div>
</div>

<script>
const WS_URL = "ws://localhost:38200";

/*
  Було: 2 / 101
  Для твого віджета це давало занадто малий приріст.
*/
const EMA_K = 0.022;

const el = id => document.getElementById(id);

const widgetEl = el("widget");
const percentEl = el("percent");
const deltaEl = el("delta");
const barEl = el("bar");
const valueEl = el("value");
const targetEl = el("target");
const tankEl = el("tank");

let ws;
let reconnectTimer;

let playerId = null;

let damage = 0;
let liveAssist = 0;
let spotAssist = 0;
let trackAssist = 0;
let stunAssist = 0;

let startRating = null;
let startAvg = null;

let vehicleTag = null;
let tankShortName = null;
let tankName = null;

let moeDistribution = null;
let lastBattleResultApplied = false;

function fmt(n){
  return Number(Math.round(n || 0)).toLocaleString("uk-UA");
}

function num(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

function clamp(v,min,max){
  return Math.max(min, Math.min(max, v));
}

function cleanTankName(){
  if (tankShortName){
    return tankShortName.replace(/([A-Z])(\d+)/g,"$1 $2");
  }

  if (tankName){
    return tankName.replace(/([A-Z])(\d+)/g,"$1 $2");
  }

  if (vehicleTag){
    let n = vehicleTag;
    if (n.includes(":")) n = n.split(":")[1];
    n = n.replace(/^[A-Z]\d+_/,"");
    n = n.replace(/_/g," ");
    n = n.replace(/([A-Z])(\d+)/g,"$1 $2");
    return n;
  }

  return "";
}

function bestAssist(){
  return Math.max(
    Number(liveAssist) || 0,
    Number(spotAssist) || 0,
    Number(trackAssist) || 0,
    Number(stunAssist) || 0
  );
}

function battleValue(){
  return (Number(damage) || 0) + bestAssist();
}

function predictedAvg(){
  if (startAvg === null || startAvg <= 0) return null;

  const battle = battleValue();

  return startAvg + (battle - startAvg) * EMA_K;
}

function storageKey(){
  const key = vehicleTag || tankShortName || tankName || "unknown";
  return "wotstat_moe_widget_v2_" + key;
}

function saveVehicleData(){
  if (!vehicleTag && !tankShortName && !tankName) return;

  const data = {
    vehicleTag,
    tankShortName,
    tankName,
    startRating,
    startAvg,
    moeDistribution,
    savedAt: Date.now()
  };

  localStorage.setItem(storageKey(), JSON.stringify(data));
}

function loadVehicleData(){
  if (!vehicleTag && !tankShortName && !tankName) return false;

  const raw = localStorage.getItem(storageKey());
  if (!raw) return false;

  try{
    const data = JSON.parse(raw);

    if (Date.now() - Number(data.savedAt || 0) > 1000 * 60 * 60 * 24 * 7){
      return false;
    }

    if (startRating === null && data.startRating !== null && data.startRating !== undefined){
      startRating = Number(data.startRating);
    }

    if (startAvg === null && data.startAvg !== null && data.startAvg !== undefined){
      startAvg = Number(data.startAvg);
    }

    if (!moeDistribution && Array.isArray(data.moeDistribution)){
      moeDistribution = data.moeDistribution;
    }

    update();
    return true;
  }catch(e){
    return false;
  }
}

function deepFind(obj, keys, path = ""){
  const found = [];

  if (!obj || typeof obj !== "object") return found;

  for (const k of Object.keys(obj)){
    const full = path ? path + "." + k : k;

    if (keys.includes(k)){
      found.push({path:full,key:k,value:obj[k]});
    }

    if (obj[k] && typeof obj[k] === "object"){
      found.push(...deepFind(obj[k], keys, full));
    }
  }

  return found;
}

function normalizeMoeDistribution(raw){
  if (!raw) return null;

  let points = [];

  if (Array.isArray(raw)){
    for (const item of raw){
      if (Array.isArray(item) && item.length >= 2){
        let a = num(item[0]);
        let b = num(item[1]);

        if (a !== null && b !== null){
          if (a <= 100 && b > 100){
            points.push({percent:a, damage:b});
          } else if (b <= 100 && a > 100){
            points.push({percent:b, damage:a});
          }
        }
      } else if (item && typeof item === "object"){
        const p =
          num(item.percent) ??
          num(item.rating) ??
          num(item.mark) ??
          num(item.key) ??
          num(item.percentile);

        const d =
          num(item.damage) ??
          num(item.value) ??
          num(item.avgDamage) ??
          num(item.movingAvgDamage) ??
          num(item.targetDamage) ??
          num(item.requiredDamage);

        if (p !== null && d !== null){
          if (p <= 100 && d > 0){
            points.push({percent:p, damage:d});
          }
        }
      }
    }
  }

  if (typeof raw === "object" && !Array.isArray(raw)){
    const temp = [];

    for (const k of Object.keys(raw)){
      const a = num(k);
      const b = num(raw[k]);

      if (a !== null && b !== null){
        temp.push([a,b]);
      }
    }

    let percentToDamage = 0;
    let damageToPercent = 0;

    for (const [a,b] of temp){
      if (a >= 0 && a <= 100 && b > 100) percentToDamage++;
      if (a > 100 && b >= 0 && b <= 100) damageToPercent++;
    }

    for (const [a,b] of temp){
      if (percentToDamage >= damageToPercent){
        if (a >= 0 && a <= 100 && b > 0){
          points.push({percent:a, damage:b});
        }
      } else {
        if (b >= 0 && b <= 100 && a > 0){
          points.push({percent:b, damage:a});
        }
      }
    }
  }

  const clean = points
    .filter(p =>
      Number.isFinite(p.percent) &&
      Number.isFinite(p.damage) &&
      p.percent >= 0 &&
      p.percent <= 100 &&
      p.damage > 0
    )
    .sort((a,b) => a.percent - b.percent);

  return clean.length >= 2 ? clean : null;
}

function interpolateRatingFromAvg(avg){
  if (avg === null || !moeDistribution || moeDistribution.length < 2){
    return null;
  }

  const points = moeDistribution;

  if (avg <= points[0].damage){
    const a = points[0];
    const b = points[1];
    const slope = (b.percent - a.percent) / Math.max(1, b.damage - a.damage);
    return clamp(a.percent - (a.damage - avg) * slope, 0, 100);
  }

  for (let i = 0; i < points.length - 1; i++){
    const a = points[i];
    const b = points[i + 1];

    if (avg >= a.damage && avg <= b.damage){
      const t = (avg - a.damage) / Math.max(1, b.damage - a.damage);
      return a.percent + t * (b.percent - a.percent);
    }
  }

  const last = points[points.length - 1];
  const prev = points[points.length - 2];

  const slope = (last.percent - prev.percent) / Math.max(1, last.damage - prev.damage);
  return clamp(last.percent + (avg - last.damage) * slope, 0, 100);
}

function fallbackPercentFromAvg(avg){
  if (startRating === null || startAvg === null || startAvg <= 0 || avg === null) return null;

  const estimatedDamagePerOnePercent = Math.max(45, startAvg * 0.018);

  return startRating + (avg - startAvg) / estimatedDamagePerOnePercent;
}

function percentCalc(){
  const avg = predictedAvg();
  if (avg === null || startRating === null) return null;

  const exact = interpolateRatingFromAvg(avg);
  if (exact !== null) return exact;

  return fallbackPercentFromAvg(avg);
}

function update(){
  const v = battleValue();
  const avg = predictedAvg();

  valueEl.textContent = fmt(v);
  targetEl.textContent = avg !== null ? fmt(avg) : "0";

  valueEl.className = "value " + (avg !== null && v >= avg ? "good" : "bad");

  const p = percentCalc();

  if (p !== null){
    const safeP = clamp(p,0,100);

    percentEl.textContent = safeP.toFixed(2) + "%";
    barEl.style.width = safeP + "%";

    const diff = safeP - startRating;

    deltaEl.textContent = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";

    if (diff > 0.005){
      deltaEl.className = "delta plus";
    } else if (diff < -0.005){
      deltaEl.className = "delta minus";
    } else {
      deltaEl.className = "delta neutral";
    }
  } else {
    percentEl.textContent = "--.--%";
    barEl.style.width = "0%";
    deltaEl.textContent = "0.00%";
    deltaEl.className = "delta neutral";
  }

  tankEl.textContent = cleanTankName();
}

function resetBattleOnly(){
  damage = 0;
  liveAssist = 0;
  spotAssist = 0;
  trackAssist = 0;
  stunAssist = 0;
  lastBattleResultApplied = false;
  update();
}

function applyDossier(value){
  if (!value || typeof value !== "object") return;

  const found = deepFind(value, [
    "damageRating",
    "movingAvgDamage",
    "damageBetterThanNPercent",
    "vehicleTag",
    "localizedShortName",
    "localizedName",
    "tag"
  ]);

  for (const f of found){
    if ((f.key === "vehicleTag" || f.key === "tag") && f.value){
      vehicleTag = String(f.value);
    }

    if (f.key === "localizedShortName" && f.value){
      tankShortName = String(f.value);
    }

    if (f.key === "localizedName" && f.value){
      tankName = String(f.value);
    }

    if (f.key === "damageRating"){
      const v = num(f.value);
      if (v !== null && v > 0 && v <= 100 && battleValue() === 0){
        startRating = v;
      }
    }

    if (f.key === "movingAvgDamage"){
      const v = num(f.value);
      if (v !== null && v > 0 && battleValue() === 0){
        startAvg = v;
      }
    }

    if (f.key === "damageBetterThanNPercent"){
      const dist = normalizeMoeDistribution(f.value);
      if (dist) moeDistribution = dist;
    }
  }

  saveVehicleData();
  update();
}

function applyMoeInfo(value){
  if (!value || typeof value !== "object") return;

  const found = deepFind(value, [
    "damageBetterThanNPercent",
    "damageRating",
    "movingAvgDamage",
    "vehicleTag",
    "localizedShortName",
    "localizedName",
    "tag"
  ]);

  for (const f of found){
    if ((f.key === "vehicleTag" || f.key === "tag") && f.value){
      vehicleTag = String(f.value);
    }

    if (f.key === "localizedShortName" && f.value){
      tankShortName = String(f.value);
    }

    if (f.key === "localizedName" && f.value){
      tankName = String(f.value);
    }

    if (f.key === "damageBetterThanNPercent"){
      const dist = normalizeMoeDistribution(f.value);
      if (dist) moeDistribution = dist;
    }

    if (f.key === "damageRating"){
      const v = num(f.value);
      if (v !== null && v > 0 && v <= 100 && battleValue() === 0){
        startRating = v;
      }
    }

    if (f.key === "movingAvgDamage"){
      const v = num(f.value);
      if (v !== null && v > 0 && battleValue() === 0){
        startAvg = v;
      }
    }
  }

  saveVehicleData();
  update();
}

function extractPlayerIdFromBattleResult(result){
  const personal = result?.personal || {};

  for (const key of Object.keys(personal)){
    if (key === "avatar") continue;

    const r = personal[key];
    if (!r || typeof r !== "object") continue;

    if (typeof r.accountDBID !== "undefined"){
      return Number(r.accountDBID);
    }
  }

  return null;
}

function applyBattleResult(result){
  if (lastBattleResultApplied) return;

  const detectedId = extractPlayerIdFromBattleResult(result);

  if (detectedId && !playerId){
    playerId = detectedId;
  }

  const personal = result?.personal || {};

  for (const key of Object.keys(personal)){
    if (key === "avatar") continue;

    const r = personal[key];
    if (!r || typeof r !== "object") continue;

    if (playerId && Number(r.accountDBID) !== Number(playerId)) continue;

    damage = Number(r.damageDealt) || 0;

    spotAssist = Number(r.damageAssistedRadio) || 0;
    trackAssist = Number(r.damageAssistedTrack) || 0;
    stunAssist = Number(r.damageAssistedStun) || 0;
    liveAssist = Math.max(spotAssist, trackAssist, stunAssist);

    lastBattleResultApplied = true;
    update();
    return;
  }
}

function connect(){
  ws = new WebSocket(WS_URL);

  ws.onopen = () => clearTimeout(reconnectTimer);

  ws.onclose = () => {
    reconnectTimer = setTimeout(connect,1000);
  };

  ws.onerror = () => {
    try{ ws.close(); }catch(e){}
  };

  ws.onmessage = e => {
    let p;

    try{
      p = JSON.parse(e.data);
    }catch(err){
      return;
    }

    if (!p || !p.type) return;

    if (p.type === "state"){
      switch(p.path){

        case "hangar.isInHangar":
          widgetEl.classList.toggle("hidden", !!p.value);
          if (p.value) resetBattleOnly();
          break;

        case "battle.isInBattle":
          widgetEl.classList.toggle("hidden", p.value === false);
          break;

        case "battle.vehicle":
          if (p.value?.localizedShortName) tankShortName = p.value.localizedShortName;
          if (p.value?.localizedName) tankName = p.value.localizedName;
          if (p.value?.tag) vehicleTag = p.value.tag;

          loadVehicleData();
          update();
          break;

        case "battle.efficiency.damage":
          damage = Number(p.value) || 0;
          update();
          break;

        case "battle.efficiency.assist":
          liveAssist = Number(p.value) || 0;
          update();
          break;

        case "battle.efficiency.damageAssistedRadio":
          spotAssist = Number(p.value) || 0;
          update();
          break;

        case "battle.efficiency.damageAssistedTrack":
          trackAssist = Number(p.value) || 0;
          update();
          break;

        case "battle.efficiency.damageAssistedStun":
          stunAssist = Number(p.value) || 0;
          update();
          break;

        case "dossier.current":
          applyDossier(p.value);
          break;

        case "moeInfo.current":
          applyMoeInfo(p.value);
          break;

        default:
          const path = String(p.path).toLowerCase();

          if (path.includes("dossier")) applyDossier(p.value);
          if (path.includes("moe")) applyMoeInfo(p.value);

          if (path.includes("assist")){
            const v = Number(p.value) || 0;

            if (path.includes("radio")){
              spotAssist = v;
            } else if (path.includes("track")){
              trackAssist = v;
            } else if (path.includes("stun")){
              stunAssist = v;
            } else {
              liveAssist = v;
            }

            update();
          }

          break;
      }
    }

    if (p.type === "trigger" && p.path === "battle.onBattleResult"){
      applyBattleResult(p.value);
    }
  };
}

update();
connect();
</script>

</body>
</html>
