<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; font-family: 'Arial', sans-serif; color: white; text-shadow: 2px 2px 2px black; }
        .container { display: flex; gap: 20px; padding: 10px; }
        .player-card { background: rgba(0, 0, 0, 0.6); padding: 10px; border-radius: 5px; min-width: 150px; border-left: 4px solid #ff9d00; }
        .name { font-size: 14px; color: #ccc; }
        .moe { font-size: 24px; font-weight: bold; color: #fff; }
        .delta { font-size: 12px; }
        .plus { color: #5eff00; }
        .minus { color: #ff4040; }
    </style>
</head>
<body>
    <div class="container">
        <div id="p1" class="player-card">
            <div class="name">ГРАВЕЦЬ 1</div>
            <div class="moe">0.00%</div>
            <div class="delta">--</div>
        </div>
        <div id="p2" class="player-card">
            <div class="name">ГРАВЕЦЬ 2</div>
            <div class="moe">0.00%</div>
            <div class="delta">--</div>
        </div>
    </div>

    <script>
        // Підключення до локального сервера, який створює мод
        const socket = new WebSocket('ws://localhost:1543'); // Порт з конфігу wotstat

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.type === 'UPDATE_MOE') {
                updateUI('p1', data.p1);
                updateUI('p2', data.p2);
            }
        };

        function updateUI(id, pData) {
            const el = document.getElementById(id);
            el.querySelector('.moe').innerText = pData.value.toFixed(2) + '%';
            const deltaEl = el.querySelector('.delta');
            deltaEl.innerText = (pData.delta >= 0 ? '+' : '') + pData.delta.toFixed(2);
            deltaEl.className = 'delta ' + (pData.delta >= 0 ? 'plus' : 'minus');
        }
    </script>
</body>
</html>
