<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<style>
    html, body { margin: 0; padding: 0; background: transparent; font-family: "Roboto Condensed", Arial, sans-serif; overflow: hidden; color: #fff; }
    body { padding: 12px; }
    .widget { width: 260px; padding: 14px; border-radius: 8px; background: rgba(0,0,0,.5); box-shadow: 0 0 15px rgba(0,0,0,0.5); }
    .top { display: flex; justify-content: center; align-items: baseline; gap: 8px; }
    .percent { font-size: 38px; font-weight: 700; text-shadow: 0 2px 4px #000; }
    .delta { font-size: 18px; font-weight: 700; text-shadow: 0 2px 4px #000; }
    .plus { color: #60ff00; } .minus { color: #ff4b4b; }
    .bar-bg { margin: 12px 0; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff4b4b, #ffff00, #60ff00); transition: width 0.3s; }
    .total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; }
    .target-val { color: #eee; }
    .current-val.bad { color: #ff4b4b; } .current-val.good { color: #60ff00; }
    .tank-name { margin-top: 5px; font-size: 12px; color: #aaa; text-transform: uppercase; }
</style>
</head>
<body>

<div id="widget" class="widget">
    <div class="top">
        <div id="percent" class="percent">--.--%</div>
        <div id="delta" class="delta">0.00%</div>
    </div>
    <div class="bar-bg"><div id="bar" class="bar"></div></div>
    <div class="total">
        <span>Загалом</span>
        <div><span id="current" class="current-val bad">0</span> / <span id="target" class="target-val">0</span></div>
    </div>
    <div id="tank" class="tank-name">Завантаження...</div>
</div>

<script>
const WS_URL = "ws://localhost:38200";
const el = id => document.getElementById(id);

let state = {
    damage: 0, spot: 0, track: 0, stun: 0,
    startPercent: null,
    targetDamage: 0, // Це та сама цифра "Загалом"
    tankName: ""
};

function getBestAssist() {
    return Math.max(state.spot, state.track, state.stun);
}

function updateUI() {
    const total = state.damage + getBestAssist();
    const diff = state.targetDamage > 0 ? (total - state.targetDamage) : 0;
    
    // Орієнтовний розрахунок дельти (1% відмітки ≈ 40-150 од. залежно від танка)
    // Використовуємо спрощену модель для візуалізації, поки не отримаємо точні дані
    const estimatedWeight = state.targetDamage * 0.04; 
    const deltaPct = diff / estimatedWeight;
    const currentPct = (state.startPercent || 0) + deltaPct;

    el("current").textContent = total.toLocaleString("uk-UA");
    el("target").textContent = Math.round(state.targetDamage).toLocaleString("uk-UA");
    el("percent").textContent = (state.startPercent ? currentPct.toFixed(2) : "--.--") + "%";
    el("bar").style.width = Math.min(100, Math.max(0, currentPct)) + "%";
    
    const deltaEl = el("delta");
    deltaEl.textContent = (deltaPct >= 0 ? "+" : "") + deltaPct.toFixed(2) + "%";
    deltaEl.className = "delta " + (deltaPct >= 0 ? "plus" : "minus");
    el("current").className = "current-val " + (total >= state.targetDamage ? "good" : "bad");
    el("tank").textContent = state.tankName;
}

function deepSearch(obj, key) {
    if (obj && typeof obj === "object") {
        if (key in obj) return obj[key];
        for (let k in obj) {
            let res = deepSearch(obj[k], key);
            if (res !== undefined) return res;
        }
    }
}

function connect() {
    const ws = new WebSocket(WS_URL);
    ws.onmessage = e => {
        const data = JSON.parse(e.data);
        if (data.type === "state") {
            const path = data.path.toLowerCase();
            const val = data.value;

            // 1. Отримуємо назву танка
            if (path.includes("vehicle") && val?.localizedShortName) state.tankName = val.localizedShortName;

            // 2. Отримуємо бойові показники
            if (path.includes("efficiency.damage")) state.damage = Number(val) || 0;
            if (path.includes("assistedradio")) state.spot = Number(val) || 0;
            if (path.includes("assistedtrack")) state.track = Number(val) || 0;
            if (path.includes("assistedstun")) state.stun = Number(val) || 0;

            // 3. СИНХРОНІЗАЦІЯ ПЛАНКИ (Найважливіше)
            // Шукаємо movingAvgDamage у будь-яких пакетах (dossier або moeInfo)
            const foundTarget = deepSearch(val, "movingAvgDamage");
            if (foundTarget) state.targetDamage = foundTarget;

            const foundRating = deepSearch(val, "damageRating");
            if (foundRating && state.damage === 0) state.startPercent = foundRating;

            updateUI();
        }
    };
    ws.onclose = () => setTimeout(connect, 1000);
}

connect();
</script>
</body>
</html>
