<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap');
        body { margin: 0; background: transparent; font-family: 'Roboto', sans-serif; color: white; overflow: hidden; }
        
        .moe-container {
            display: flex; flex-direction: column;
            background: rgba(20, 20, 20, 0.9);
            padding: 15px 25px;
            border-left: 6px solid #36ff50;
            width: fit-content;
            border-radius: 0 10px 10px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .tank-name { font-size: 16px; color: #aaa; text-transform: uppercase; margin-bottom: 2px; }
        .main-row { display: flex; align-items: baseline; gap: 15px; }
        .current-moe { font-size: 60px; line-height: 1; font-weight: 900; color: #fff; }
        
        .delta { font-size: 24px; font-weight: bold; }
        .plus { color: #36ff50; }
        .minus { color: #ff4040; }

        .info-row { 
            display: flex; justify-content: space-between; 
            margin-top: 10px; font-size: 18px; color: #eee;
            border-top: 1px solid #333; padding-top: 8px; gap: 20px;
        }
        .label { color: #888; font-size: 14px; text-transform: uppercase; margin-right: 5px; }
        .val { font-weight: bold; }
    </style>
</head>
<body>

<div class="moe-container">
    <div class="tank-name" id="tank-name">Очікування...</div>
    <div class="main-row">
        <div class="current-moe" id="moe-val">0.00%</div>
        <div id="moe-delta" class="delta">+0.00%</div>
    </div>
    
    <div class="info-row">
        <div><span class="label">Сумарка:</span><span class="val" id="current-total">0</span></div>
        <div><span class="label">Треба:</span><span class="val" id="target-total" style="color: #36ff50;">0</span></div>
    </div>
</div>

<script>
    let startMoe = 0;

    function connect() {
        // Підключаємось до локального сервера WotStat
        const socket = new WebSocket("ws://localhost:38200");

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // WotStat шле повний стан у полі "value", якщо шлях порожній або "battle"
            if (data.type === "state") {
                const state = data.value;
                const battle = state.battle || {};
                const arena = state.arena || {};
                
                // 1. Отримуємо назву танка
                if (arena.playerVehicle) {
                    document.getElementById('tank-name').innerText = arena.playerVehicle.name;
                }

                // 2. Отримуємо дані відмітки (Gun Marks)
                // WotStat рахує це автоматично
                if (battle.efficiency && battle.efficiency.gunMark) {
                    const gm = battle.efficiency.gunMark;
                    
                    // Поточний % відмітки (прогноз)
                    const currentMoe = gm.currentMoe || 0;
                    if (startMoe === 0) startMoe = currentMoe;

                    document.getElementById('moe-val').innerText = currentMoe.toFixed(2) + "%";

                    // Розрахунок дельти
                    const diff = currentMoe - startMoe;
                    const deltaEl = document.getElementById('moe-delta');
                    deltaEl.innerText = (diff >= 0 ? "+" : "") + diff.toFixed(2) + "%";
                    deltaEl.className = "delta " + (diff >= 0 ? "plus" : "minus");

                    // 3. Сумарка та "Ціль" (скільки треба для росту)
                    const dmg = battle.efficiency.damage || 0;
                    const ast = battle.efficiency.assist || 0;
                    document.getElementById('current-total').innerText = (dmg + ast);
                    
                    // "Планка" відмітки (скільки треба тримати для поточного %)
                    if (gm.targetDamage) {
                        document.getElementById('target-total').innerText = Math.round(gm.targetDamage);
                    }
                }
            }
        };

        socket.onclose = () => setTimeout(connect, 2000);
    }

    connect();
</script>
</body>
</html>
